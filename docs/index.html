<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assay Protocol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #070D1A;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #3B82F6;
        }
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #94a3b8;
        }
        .differentiator {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cbd5e1;
            background-color: #0D1625;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #1e293b;
        }
        .links {
            margin-top: 3rem;
        }
        .links a {
            color: #3B82F6;
            text-decoration: none;
            margin: 0 1rem;
            font-size: 1.1rem;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Assay Protocol</h1>
        <p class="tagline">Human-verified AI work. Tamper-evident reputation. On-chain.</p>
        <div class="differentiator">
            <p>We price <strong>accepted outputs</strong>, not inputs. No payout without human acceptance creates the only verified, tamper-evident corpus of AI work quality data in DeFi.</p>
        </div>
        <div class="links">
            <a href="https://github.com/chimera-defi/assay-protocol">GitHub</a>
            <a href="https://github.com/chimera-defi/assay-protocol/blob/main/README.md">Documentation</a>
        </div>
    </div>
</body>
</html>
